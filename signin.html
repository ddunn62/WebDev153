<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nightlens — Sign In</title>
<meta name="description" content="Sign in to nightlens to join the astronomy community, share astrophotography, and access forum and resource features.">
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page signin-page">

  <header class="site-banner">
    <div class="site-name">nightlens</div>
  </header>

  <main class="auth-main">
    <section class="auth-panel">
      <h1>Sign In</h1>

      <form id="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <div class="field-error" id="email-error"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required>
          <div class="field-error" id="password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <a href="about.html">Contact / About</a> | 
    <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy Policy</a> | 
    <a href="https://firebase.google.com/docs/rules" target="_blank" rel="noopener">Account Security</a>
    <p>
      <a href="https://jigsaw.w3.org/css-validator/check/referer">
        <img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss-blue" alt="Valid CSS!">
      </a>
    </p>
  </footer>

<script type="module" src="code.js"></script>
</body>
</html>
