<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nightlens — Curated Feed</title>
<meta name="description" content="Browse the nightlens curated feed for astronomy articles, astrophotography inspiration, and beginner-friendly space resources.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="app-sidebar" aria-label="Main navigation">
    <a class="sidebar-icon active" href="feed.html" title="Home / Curated Feed">
      <img src="icons/house.svg" alt="Feed page">
    </a>
    <a class="sidebar-icon" href="forum.html" title="Image Forum">
      <img src="icons/gallery-vertical-end.svg" alt="Forum page">
    </a>
    <a class="sidebar-icon" href="resources.html" title="Resource Aggregator">
      <img src="icons/telescope.svg" alt="Resources page">
    </a>
    <div class="sidebar-spacer"></div>
    <a class="sidebar-icon" href="about.html" title="About">
      <img src="icons/earth.svg" alt="About page">
    </a>
  </nav>

  <main class="app-main">
    <div class="app-header">
      <a class="back-link" href="index.html" aria-label="Back to Welcome">← Back to Welcome</a>
      <div class="app-header-actions">
        <a class="btn btn-secondary btn-small auth-btn" href="signin.html">Sign In</a>
        <a class="btn btn-cyan btn-small auth-btn" href="signup.html">Sign Up</a>
        <button class="btn btn-primary btn-small" id="logout-btn" style="display: none;">Logout</button>
      </div>
    </div>
    <div class="site-header page-head">
      <a class="site-logo" href="feed.html" aria-label="Feed homepage">
        <img src="icons/focus-orbit.svg" alt="nightlens feed logo">
        <span class="site-logo-text">Feed</span>
      </a>
    </div>

    <div class="toolbar">
      <span class="toolbar-label">All topics</span>
      <div class="toolbar-actions">
        <button class="icon-btn" data-dropdown-trigger="feed-filter-panel" title="Filter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M7 12h10M10 19h4"/></svg>
        </button>
        <div class="dropdown-panel" id="feed-filter-panel">
          <button data-option class="active">All topics</button>
          <button data-option>Deep sky</button>
          <button data-option>Planetary</button>
          <button data-option>General Info</button>
        </div>
      </div>
    </div>

    <div class="card-list" id="feed-container">
      <!-- Articles dynamically populated here -->
    </div>
  </main>

  <footer class="site-footer">
    <a href="about.html">Contact / About</a> | 
    <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy Policy</a> | 
    <a href="https://firebase.google.com/docs/rules" target="_blank" rel="noopener">Account Security</a>
    <p>
      <a href="https://jigsaw.w3.org/css-validator/check/referer">
        <img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss-blue" alt="Valid CSS!">
      </a>
    </p>
  </footer>
<script type="module" src="code.js"></script>
</body>
</html>
