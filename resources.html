<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightlog — Resource Aggregator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="app-sidebar" aria-label="Main navigation">
    <a class="sidebar-icon" href="feed.html" title="Home / Curated Feed">
      <img src="icons/house.svg" alt="Home">
    </a>
    <a class="sidebar-icon" href="forum.html" title="Image Forum">
      <img src="icons/gallery-vertical-end.svg" alt="Forum">
    </a>
    <a class="sidebar-icon active" href="resources.html" title="Resource Aggregator">
      <img src="icons/telescope.svg" alt="Resources">
    </a>
    <div class="sidebar-spacer"></div>
    <a class="sidebar-icon" href="about.html" title="About">
      <img src="icons/earth.svg" alt="About">
    </a>
  </nav>

  <main class="app-main">
    <div class="app-header">
      <a class="back-link" href="feed.html" aria-label="Back to Feed">← Back to Feed</a>
      <div class="app-header-actions">
        <a class="btn btn-secondary btn-small" href="signin.html">Sign In</a>
        <a class="btn btn-primary btn-small" href="signup.html">Sign Up</a>
      </div>
    </div>
    <div class="page-head">
      <svg class="logo-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><ellipse cx="12" cy="12" rx="9" ry="3.2" transform="rotate(-20 12 12)"/><circle cx="12" cy="12" r="5"/></svg>
      <h1>Resource Aggregator</h1>
    </div>

    <div class="category-row">
      <button class="category-pill active" data-filter="all">Starter Packs</button>
      <button class="category-pill" data-filter="telescopes">Telescopes</button>
      <button class="category-pill" data-filter="eyepieces">Eyepieces</button>
      <button class="category-pill" data-filter="cameras">Cameras</button>
    </div>

    <div class="toolbar">
      <span class="toolbar-label">Newest first</span>
      <div class="toolbar-actions">
        <button class="icon-btn" data-dropdown-trigger="resource-sort-panel" data-label-prefix="Sort" title="Sort">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h10M3 12h7M3 18h4"/><path d="M17 5v14M17 19l3-3M17 19l-3-3"/></svg>
        </button>
        <div class="dropdown-panel" id="resource-sort-panel">
          <button data-option class="active">Newest first</button>
          <button data-option>Name A–Z</button>
          <button data-option>Most saved</button>
        </div>
      </div>
    </div>

    <div class="card-list" id="resource-card-list">
      <table class="resource-table" aria-label="Resource list">
        <thead>
          <tr>
            <th>Resource</th>
            <th>Category</th>
          </tr>
        </thead>
        <tbody>
          <tr class="card" data-category="telescopes">
            <td><h2>Choosing your first telescope</h2></td>
            <td>Telescopes</td>
          </tr>
          <tr class="card" data-category="eyepieces">
            <td><h2>Eyepiece focal length cheat sheet</h2></td>
            <td>Eyepieces</td>
          </tr>
          <tr class="card" data-category="cameras">
            <td><h2>Budget astrophotography cameras, ranked</h2></td>
            <td>Cameras</td>
          </tr>
          <tr class="card" data-category="telescopes">
            <td><h2>Collimating a Newtonian, step by step</h2></td>
            <td>Telescopes</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="scroll-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="14" rx="4"/><path d="M12 6v3"/></svg>
    Scroll
  </div>

<script src="code.js"></script>
</body>
</html>
