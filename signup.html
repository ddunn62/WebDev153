<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nightlens — Sign Up</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page signup-page">

  <header class="site-banner">
    <div class="site-name">nightlens</div>
  </header>

  <main class="auth-main">
    <section class="auth-panel">
      <h1>Sign Up</h1>

      <form id="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <div class="field-error" id="email-error"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required>
          <div class="field-error" id="password-error"></div>
        </div>
        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" required>
          <div class="field-error" id="confirm-password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="signin.html">Sign in</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <a href="about.html">Contact / About</a> | 
    <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy Policy</a> | 
    <a href="https://firebase.google.com/docs/rules" target="_blank" rel="noopener">Account Security</a>
  </footer>

<script type="module" src="code.js"></script>
</body>
</html>
